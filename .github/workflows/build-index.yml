name: Build index.json

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build index
        run: node scripts/build-index.mjs

      - name: Verify index is up to date
        run: |
          if ! git diff --quiet index.json; then
            echo "❌ index.json is out of date. Run 'node scripts/build-index.mjs' locally and commit the result."
            exit 1
          fi